name: CI/CD — Budgy

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy.yml'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'

jobs:
  build:
    name: Build & Push image Docker
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/gitjaphet/budgy:latest
            ghcr.io/gitjaphet/budgy:${{ github.sha }}

  deploy:
    name: Deploy sur VPS
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_PORT }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u gitjaphet --password-stdin
            cd /opt/Budgy
            git pull origin main
            docker compose pull web
            docker compose up -d --no-deps web
            sleep 10
            docker exec budgy-web python manage.py migrate_schemas --shared
            docker exec budgy-web python manage.py migrate_schemas --tenant
            docker exec budgy-web python manage.py collectstatic --noinput
            docker image prune -af
            echo "Deploy réussi — $(date)"
