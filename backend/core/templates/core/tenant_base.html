{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budgy — {% block title %}{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">
    <link rel="stylesheet" href="{% static 'core/css/tenant_base.css' %}">
    {% block extra_css %}{% endblock %}
</head>
<body>

    <div class="app-layout">

        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-brand">
                    <div class="brand-logo">B</div>
                    <div class="brand-text">
                        <span class="brand-name">Budgy</span>
                        <span class="brand-sub">{{ request.tenant.nom }}</span>
                    </div>
                </div>
                <button class="collapse-btn" id="collapseBtn" aria-label="Réduire le menu">
                    <i class='bx bx-chevron-left'></i>
                </button>
            </div>

            <nav class="sidebar-nav">
                <a href="/" class="nav-item {% if active_page == 'resume' %}active{% endif %}">
                    <i class='ph ph-house nav-icon'></i> 
                    <span class="nav-label">Résumé</span>
                </a>
                <a href="/depenses/" class="nav-item {% if active_page == 'depenses' %}active{% endif %}">
                    <i class='ph ph-receipt nav-icon'></i> 
                    <span class="nav-label">Dépenses</span>
                </a>
                <a href="#" class="nav-item disabled">
                    <i class='ph ph-chart-bar nav-icon'></i>
                    <span class="nav-label">Budget</span>
                </a>
                <a href="#" class="nav-item disabled">
                    <i class='ph ph-arrows-clockwise nav-icon'></i>
                    <span class="nav-label">Récurrentes</span>
                </a>
                <a href="#" class="nav-item disabled">
                    <i class='ph ph-calendar-blank nav-icon'></i>
                    <span class="nav-label">Planning</span>
                </a>
                <a href="#" class="nav-item disabled">
                    <i class='ph ph-users-three nav-icon'></i>
                    <span class="nav-label">Équipe</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <a href="{% url 'dashboard' %}" class="nav-item">
                    <i class='ph ph-squares-four nav-icon'></i>
                    <span class="nav-label">Retour aux apps</span>
                </a>
                <a href="{% url 'logout' %}" class="nav-item">
                    <i class='ph ph-sign-out nav-icon'></i>
                    <span class="nav-label">Déconnexion</span>
                </a>
            </div>
        </aside>

        <div class="main-area">
            <main class="content">
                {% block content %}{% endblock %}
            </main>
        </div>

    </div>

    <script>
        const sidebar = document.getElementById('sidebar');
        const collapseBtn = document.getElementById('collapseBtn');

        collapseBtn.addEventListener('click', () => {
            sidebar.classList.toggle('collapsed');
        });
    </script>

    {% block extra_js %}{% endblock %}
</body>
</html>
