{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budgy — Connexion</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body { height: 100%; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding: 20px;
            padding-right: 8vw;
            position: relative;
            overflow-x: hidden;
        }

        @media (max-width: 768px) {
            body {
                justify-content: center;
                padding-right: 20px;
            }
        }

        .bg-video-wrap {
            position: fixed;
            inset: 0;
            z-index: -2;
            overflow: hidden;
        }

        .bg-video-wrap video {
            position: absolute;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            transform: translate(-50%, -50%);
            object-fit: cover;
        }

        .bg-video-wrap::after {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.25);
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }

        .logo {
            text-align: center;
            font-size: 2rem;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 8px;
        }

        .subtitle {
            text-align: center;
            color: #888;
            font-size: 0.95rem;
            margin-bottom: 32px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: #444;
            margin-bottom: 6px;
        }

        .form-control {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #eee;
            border-radius: 10px;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-control:focus {
            border-color: #667eea;
        }

        .errorlist {
            list-style: none;
            color: #e53e3e;
            font-size: 0.82rem;
            margin-top: 6px;
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
        }

        .btn-submit:hover { opacity: 0.9; }

        .signup-link {
            text-align: center;
            margin-top: 20px;
            font-size: 0.9rem;
            color: #888;
        }

        .signup-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="bg-video-wrap">
        <video autoplay muted loop playsinline>
            <source src="{% static 'tenants/videos/depenses.mp4' %}" type="video/mp4">
        </video>
    </div>
    <div class="card">
        <div class="logo">💰 Budgy</div>
        <div class="subtitle">Retrouvez votre espace de travail</div>

        <form method="POST">
            {% csrf_token %}

            <div class="form-group">
                <label>Email</label>
                {{ form.email }}
                {% if form.email.errors %}
                    <ul class="errorlist">
                        {% for error in form.email.errors %}
                            <li>{{ error }}</li>
                        {% endfor %}
                    </ul>
                {% endif %}
            </div>

            <button type="submit" class="btn-submit">Continuer →</button>
        </form>

        <div class="signup-link">
            Pas encore de compte ? <a href="{% url 'inscription' %}">Créer un espace</a>
        </div>
    </div>
</body>
</html>
